<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body { background: var(--color-bg); }
.row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 16px; padding: 18px; box-shadow: var(--shadow-sm); }
.head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
.lbl { font-size: 13px; color: var(--color-fg-2); font-weight: 500; }
.ico { width: 36px; height: 36px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; }
.ico i { width: 18px; height: 18px; }
.ico.in { background: var(--color-income-subtle); color: var(--color-income-strong); }
.ico.out { background: var(--color-expense-subtle); color: var(--color-expense-strong); }
.ico.bal { background: var(--color-primary-subtle); color: var(--color-primary); }
.val { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; font-variant-numeric: tabular-nums lining-nums; }
.val.in { color: var(--color-income); }
.val.out { color: var(--color-expense); }
.sub { font-size: 12px; color: var(--color-fg-3); margin-top: 4px; }
</style>
</head>
<body>
<div class="row">
  <div class="card">
    <div class="head"><div class="lbl">Ingresos del mes</div><div class="ico in"><i data-lucide="arrow-up-right"></i></div></div>
    <div class="val in">+ $ 248.500</div>
    <div class="sub">12 ingresos registrados</div>
  </div>
  <div class="card">
    <div class="head"><div class="lbl">Gastos del mes</div><div class="ico out"><i data-lucide="arrow-down-right"></i></div></div>
    <div class="val out">− $ 184.220</div>
    <div class="sub">38 transacciones</div>
  </div>
  <div class="card">
    <div class="head"><div class="lbl">Balance del mes</div><div class="ico bal"><i data-lucide="wallet"></i></div></div>
    <div class="val">$ 64.280</div>
    <div class="sub">Ingresos − Gastos</div>
  </div>
</div>
<script>lucide.createIcons();</script></body></html>
