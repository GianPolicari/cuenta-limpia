<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: stretch; padding: 10px 0; border-top: 1px solid var(--color-border); }
.row:first-of-type { border-top: none; padding-top: 0; }
.bad, .good { padding: 10px 14px; border-radius: 10px; font-size: 14px; }
.bad { background: var(--color-expense-subtle); color: var(--color-expense); }
.good { background: var(--color-income-subtle); color: var(--color-income); }
.tag { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; opacity: 0.7; }
.title { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-fg-3); margin-bottom: 10px; }
</style>
</head>
<body>
<div class="title">Voice · Argentine voseo · plain words</div>
<div class="row">
  <div class="bad"><div class="tag">Avoid</div>Total de egresos del período</div>
  <div class="good"><div class="tag">Use</div>Lo que gastaste este mes</div>
</div>
<div class="row">
  <div class="bad"><div class="tag">Avoid</div>¿Ya tienes cuenta?</div>
  <div class="good"><div class="tag">Use</div>¿Ya tenés cuenta?</div>
</div>
<div class="row">
  <div class="bad"><div class="tag">Avoid</div>Saldo deudor pendiente</div>
  <div class="good"><div class="tag">Use</div>Lo que llevás gastado</div>
</div>
<div class="row">
  <div class="bad"><div class="tag">Avoid</div>Categorización de erogaciones</div>
  <div class="good"><div class="tag">Use</div>Categorías de gastos</div>
</div>
<script>lucide.createIcons();</script></body></html>
