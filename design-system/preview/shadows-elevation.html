<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
body { background: var(--color-bg); }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 22px; padding: 14px 4px 28px; }
.cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.box { width: 100%; height: 70px; background: var(--color-surface); border-radius: 14px; }
.tk { font-family: ui-monospace, monospace; font-size: 11px; color: var(--color-fg-2); }
.lbl { font-size: 11px; color: var(--color-fg-3); }
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><div class="box" style="box-shadow: 0 1px 2px 0 rgba(11,11,18,0.04)"></div><div class="tk">--shadow-xs</div><div class="lbl">inputs</div></div>
  <div class="cell"><div class="box" style="box-shadow: 0 1px 3px 0 rgba(11,11,18,0.06), 0 1px 2px -1px rgba(11,11,18,0.04)"></div><div class="tk">--shadow-sm</div><div class="lbl">cards rest</div></div>
  <div class="cell"><div class="box" style="box-shadow: 0 4px 12px -2px rgba(11,11,18,0.08), 0 2px 6px -2px rgba(11,11,18,0.04)"></div><div class="tk">--shadow-md</div><div class="lbl">hover · popovers</div></div>
  <div class="cell"><div class="box" style="box-shadow: 0 12px 32px -6px rgba(11,11,18,0.12)"></div><div class="tk">--shadow-lg</div><div class="lbl">dialogs · sheets</div></div>
  <div class="cell"><div class="box" style="box-shadow: 0 8px 24px -6px rgba(91,71,224,0.30); background:#5B47E0"></div><div class="tk">--shadow-brand</div><div class="lbl">primary CTA</div></div>
</div>
</body></html>
