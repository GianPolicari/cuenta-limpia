<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
.grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.cell { display:flex; flex-direction:column; gap:6px; }
.bar { height: 56px; border-radius: 10px; display:flex; align-items:center; justify-content:center; font-weight:600; color:#fff; font-size:13px; }
.sub { height: 28px; border-radius: 8px; }
</style>
</head>
<body>
<div class="grid">
  <div class="cell">
    <div class="bar" style="background:#10B981">Income</div>
    <div class="sub" style="background:#D1FAE5"></div>
    <div class="name">income</div>
    <div class="hex">#10B981 · #D1FAE5</div>
  </div>
  <div class="cell">
    <div class="bar" style="background:#EF4444">Expense</div>
    <div class="sub" style="background:#FEE2E2"></div>
    <div class="name">expense</div>
    <div class="hex">#EF4444 · #FEE2E2</div>
  </div>
  <div class="cell">
    <div class="bar" style="background:#F59E0B">Pending</div>
    <div class="sub" style="background:#FEF3C7"></div>
    <div class="name">pending</div>
    <div class="hex">#F59E0B · #FEF3C7</div>
  </div>
  <div class="cell">
    <div class="bar" style="background:#3B82F6">Info</div>
    <div class="sub" style="background:#DBEAFE"></div>
    <div class="name">info</div>
    <div class="hex">#3B82F6 · #DBEAFE</div>
  </div>
</div>
<div style="margin-top:14px;" class="subname">Never use color alone — always pair with icon + text label.</div>
</body></html>
