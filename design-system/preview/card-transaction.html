<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body { background: var(--color-bg); }
.list { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 16px; padding: 6px; box-shadow: var(--shadow-sm); }
.tx { display: grid; grid-template-columns: 40px 1fr auto; gap: 14px; align-items: center; padding: 12px 14px; border-radius: 10px; }
.tx + .tx { border-top: 1px solid var(--color-border); }
.ico { width: 40px; height: 40px; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; }
.ico i { width: 18px; height: 18px; }
.ico.food { background: #FEF3C7; color: #B45309; }
.ico.salary { background: var(--color-income-subtle); color: var(--color-income-strong); }
.ico.transport { background: var(--color-info-subtle); color: var(--color-info-strong); }
.desc { font-weight: 600; font-size: 14px; color: var(--color-fg-1); }
.meta { font-size: 12px; color: var(--color-fg-3); margin-top: 2px; display: flex; gap: 8px; align-items: center; }
.meta .dot { width: 3px; height: 3px; border-radius: 999px; background: var(--color-fg-3); }
.amt { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums lining-nums; text-align: right; }
.amt.in { color: var(--color-income); }
.amt.out { color: var(--color-expense); }
.cap { font-size: 11px; color: var(--color-fg-3); }
</style>
</head>
<body>
<div class="list">
  <div class="tx">
    <div class="ico food"><i data-lucide="shopping-cart"></i></div>
    <div><div class="desc">Compra en Carrefour</div><div class="meta">Supermercado<div class="dot"></div>Visa Galicia</div></div>
    <div><div class="amt out">− $ 12.450</div><div class="cap">26 may.</div></div>
  </div>
  <div class="tx">
    <div class="ico salary"><i data-lucide="briefcase"></i></div>
    <div><div class="desc">Sueldo Mayo</div><div class="meta">Salario<div class="dot"></div>Transferencia</div></div>
    <div><div class="amt in">+ $ 850.000</div><div class="cap">02 may.</div></div>
  </div>
  <div class="tx">
    <div class="ico transport"><i data-lucide="bus"></i></div>
    <div><div class="desc">SUBE recarga</div><div class="meta">Transporte<div class="dot"></div>Débito Santander</div></div>
    <div><div class="amt out">− $ 3.000</div><div class="cap">24 may.</div></div>
  </div>
</div>
<script>lucide.createIcons();</script></body></html>
