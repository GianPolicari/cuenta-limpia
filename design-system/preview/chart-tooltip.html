<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body { background: var(--color-bg); padding: 30px; }
.wrap { display: flex; gap: 24px; align-items: flex-end; flex-wrap: wrap; }
.tt { background: #15151F; color: #fff; border-radius: 10px; padding: 12px 14px; box-shadow: var(--shadow-md); font-family: var(--font-sans); min-width: 200px; }
.tt-cat { font-size: 12px; color: #A1A1AD; margin-bottom: 4px; }
.tt-name { font-size: 14px; font-weight: 600; }
.tt-val { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums lining-nums; margin-top: 6px; }
.tt-val.in { color: #34D399; }
.tt-val.out { color: #F87171; }
.tt-row { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-top: 4px; }
.tt-row .dot { width: 8px; height: 8px; border-radius: 999px; }
.label { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--color-fg-3); margin-bottom: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div class="label">Pie / category</div>
    <div class="tt">
      <div class="tt-name">Supermercado</div>
      <div class="tt-val">$ 42.300</div>
      <div class="tt-cat" style="margin-top:6px;">23% del total</div>
    </div>
  </div>
  <div>
    <div class="label">Bars / month</div>
    <div class="tt">
      <div class="tt-cat">Marzo 2026</div>
      <div class="tt-row"><div class="dot" style="background:#34D399"></div>Ingresos<span style="margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums;">$ 248.500</span></div>
      <div class="tt-row"><div class="dot" style="background:#F87171"></div>Gastos<span style="margin-left:auto;font-weight:700;font-variant-numeric:tabular-nums;">$ 184.220</span></div>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script></body></html>
