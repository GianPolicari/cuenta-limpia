<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body { background: var(--color-bg); padding: 24px; }
.dialog { width: 100%; max-width: 440px; margin: 0 auto; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 18px; padding: 24px; box-shadow: var(--shadow-lg); }
.ico { width: 44px; height: 44px; border-radius: 999px; background: var(--color-expense-subtle); color: var(--color-expense-strong); display: inline-flex; align-items: center; justify-content: center; }
.ico i { width: 22px; height: 22px; }
h3 { font-size: 18px; font-weight: 700; margin: 14px 0 6px; color: var(--color-fg-1); }
p { font-size: 14px; color: var(--color-fg-2); margin: 0 0 20px; line-height: 1.5; }
.actions { display: flex; gap: 10px; justify-content: flex-end; }
.btn { height: 40px; padding: 0 16px; border-radius: 10px; font-size: 14px; font-weight: 600; border: 1px solid transparent; cursor: pointer; }
.btn.cancel { background: var(--color-surface-2); color: var(--color-fg-1); border-color: var(--color-border); }
.btn.del { background: var(--color-expense-strong); color: #fff; }
</style>
</head>
<body>
<div class="dialog">
  <div class="ico"><i data-lucide="trash-2"></i></div>
  <h3>¿Eliminar este gasto?</h3>
  <p>Estás por borrar <b>Compra en Carrefour · $ 12.450</b>. Esta acción no se puede deshacer.</p>
  <div class="actions">
    <button class="btn cancel">Cancelar</button>
    <button class="btn del">Eliminar</button>
  </div>
</div>
<script>lucide.createIcons();</script></body></html>
