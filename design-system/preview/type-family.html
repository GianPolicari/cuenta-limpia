<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
.specimen { font-family: var(--font-sans); }
.huge { font-size: 84px; line-height: 1; font-weight: 700; letter-spacing: -0.03em; color: var(--color-fg-1); }
.line { display: flex; align-items: center; gap: 12px; margin-top: 6px; font-size: 14px; color: var(--color-fg-2); }
.dot { width: 6px; height: 6px; border-radius: 999px; background: var(--color-fg-3); }
.wts { display: flex; gap: 14px; margin-top: 10px; align-items: baseline; }
.wts span { font-size: 20px; color: var(--color-fg-1); }
.wts span:nth-child(1) { font-weight: 400; }
.wts span:nth-child(2) { font-weight: 500; }
.wts span:nth-child(3) { font-weight: 600; }
.wts span:nth-child(4) { font-weight: 700; }
.wts em { font-style: normal; color: var(--color-fg-3); font-size: 11px; margin-left: 4px; font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<div class="specimen">
  <div class="huge">Aa Gg Çç</div>
  <div class="line"><span class="dot"></span>Plus Jakarta Sans <span class="dot"></span>Geometric humanist <span class="dot"></span>Tabular nums</div>
  <div class="wts">
    <span>Regular<em>400</em></span>
    <span>Medium<em>500</em></span>
    <span>Semibold<em>600</em></span>
    <span>Bold<em>700</em></span>
  </div>
</div>
</body></html>
