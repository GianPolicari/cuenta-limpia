<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body { background: var(--color-bg); padding: 20px 22px; }
.list { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 16px; box-shadow: var(--shadow-sm); overflow: hidden; }
.group-head { display: flex; justify-content: space-between; align-items: center; padding: 10px 18px; background: var(--color-surface-2); border-bottom: 1px solid var(--color-border); font-size: 12px; font-weight: 600; color: var(--color-fg-2); letter-spacing: 0.02em; }
.group-head .day { text-transform: uppercase; }
.group-head .net { font-variant-numeric: tabular-nums lining-nums; font-weight: 700; }
.tx { display: grid; grid-template-columns: 36px 1fr auto; gap: 12px; align-items: center; padding: 12px 18px; }
.tx + .tx { border-top: 1px solid var(--color-border); }
.ico { width: 36px; height: 36px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; }
.ico i { width: 16px; height: 16px; }
.ico.food { background: #FEF3C7; color: #B45309; }
.ico.salary { background: var(--color-income-subtle); color: var(--color-income-strong); }
.ico.transport { background: var(--color-info-subtle); color: var(--color-info-strong); }
.ico.fun { background: var(--color-primary-subtle); color: var(--color-primary); }
.desc { font-size: 14px; font-weight: 600; color: var(--color-fg-1); }
.meta { font-size: 11px; color: var(--color-fg-3); margin-top: 2px; }
.amt { text-align: right; font-weight: 700; font-size: 14px; font-variant-numeric: tabular-nums lining-nums; }
.amt.in { color: var(--color-income); }
.amt.out { color: var(--color-expense); }
</style>
</head>
<body>
<div class="list">
  <div class="group-head"><span class="day">Hoy · 26 may.</span><span class="net" style="color: var(--color-expense);">− $ 15.450</span></div>
  <div class="tx"><div class="ico food"><i data-lucide="shopping-cart"></i></div><div><div class="desc">Compra en Carrefour</div><div class="meta">Supermercado · Visa Galicia</div></div><div class="amt out">− $ 12.450</div></div>
  <div class="tx"><div class="ico transport"><i data-lucide="bus"></i></div><div><div class="desc">SUBE</div><div class="meta">Transporte · Débito Santander</div></div><div class="amt out">− $ 3.000</div></div>
  <div class="group-head"><span class="day">Ayer · 25 may.</span><span class="net" style="color: var(--color-income);">+ $ 25.000</span></div>
  <div class="tx"><div class="ico fun"><i data-lucide="film"></i></div><div><div class="desc">Cine — Cinemark Palermo</div><div class="meta">Salidas · Visa Galicia</div></div><div class="amt out">− $ 8.200</div></div>
  <div class="tx"><div class="ico salary"><i data-lucide="briefcase"></i></div><div><div class="desc">Freelance — proyecto Mariana</div><div class="meta">Trabajo extra · Transferencia</div></div><div class="amt in">+ $ 33.200</div></div>
</div>
<script>lucide.createIcons();</script></body></html>
