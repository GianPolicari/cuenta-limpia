<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; }
.cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.shape { width: 100%; height: 80px; background: var(--color-primary-subtle); border: 1px solid var(--color-primary); border-bottom: 4px solid var(--color-primary); }
.tk { font-family: ui-monospace, monospace; font-size: 11px; color: var(--color-fg-2); }
.px { font-size: 11px; color: var(--color-fg-3); }
</style>
</head>
<body>
<div class="grid">
  <div class="cell"><div class="shape" style="border-radius:6px"></div><div class="tk">--radius-sm</div><div class="px">6 px</div></div>
  <div class="cell"><div class="shape" style="border-radius:10px"></div><div class="tk">--radius-md</div><div class="px">10 px</div></div>
  <div class="cell"><div class="shape" style="border-radius:14px"></div><div class="tk">--radius-lg</div><div class="px">14 px</div></div>
  <div class="cell"><div class="shape" style="border-radius:20px"></div><div class="tk">--radius-xl</div><div class="px">20 px</div></div>
  <div class="cell"><div class="shape" style="border-radius:9999px"></div><div class="tk">--radius-full</div><div class="px">pill</div></div>
</div>
</body></html>
