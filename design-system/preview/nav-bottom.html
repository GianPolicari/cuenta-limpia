<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body { background: var(--color-bg); padding: 16px 0; display: flex; justify-content: center; align-items: center; }
.frame { width: 360px; }
.bar { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 22px; padding: 8px; display: grid; grid-template-columns: repeat(4, 1fr); box-shadow: var(--shadow-md); }
.tab { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 10px 6px; border-radius: 14px; color: var(--color-fg-2); cursor: pointer; }
.tab i { width: 22px; height: 22px; stroke-width: 2; }
.tab span { font-size: 11px; font-weight: 500; }
.tab.active { background: var(--color-primary-subtle); color: var(--color-primary); }
.tab.active span { font-weight: 600; }
.fab-wrap { display:flex; justify-content:center; padding: 14px 0 8px; }
.fab { width: 56px; height: 56px; border-radius: 999px; background: var(--color-primary); color:#fff; display:inline-flex; align-items:center; justify-content:center; box-shadow: 0 8px 24px -6px rgba(91,71,224,0.4); }
.fab i { width: 24px; height: 24px; }
.cap { font-size: 11px; color: var(--color-fg-3); text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="frame">
  <div class="fab-wrap"><div class="fab"><i data-lucide="plus"></i></div></div>
  <div class="bar">
    <div class="tab active"><i data-lucide="layout-dashboard"></i><span>Inicio</span></div>
    <div class="tab"><i data-lucide="arrow-left-right"></i><span>Movimientos</span></div>
    <div class="tab"><i data-lucide="credit-card"></i><span>Tarjetas</span></div>
    <div class="tab"><i data-lucide="user-round"></i><span>Perfil</span></div>
  </div>
  <div class="cap">Bottom nav · 4 tabs · 56px FAB for new operation</div>
</div>
<script>lucide.createIcons();</script></body></html>
