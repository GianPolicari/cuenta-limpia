<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body { background: var(--color-bg); padding: 20px 24px; }
.wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 14px; padding: 14px; box-shadow: var(--shadow-sm); }
.title { font-size: 13px; font-weight: 600; color: var(--color-fg-1); margin-bottom: 4px; }
.sub { font-size: 11px; color: var(--color-fg-3); margin-bottom: 10px; }
svg { display: block; width: 100%; height: 160px; }
.tt { font-family: ui-monospace, monospace; font-size: 10px; fill: var(--color-fg-3); }
.gl { stroke: #E6E6EC; stroke-dasharray: 3 3; }
text { font-family: var(--font-sans); font-size: 11px; fill: var(--color-fg-2); }
.legend { display: flex; gap: 14px; font-size: 11px; color: var(--color-fg-2); margin-top: 8px; }
.dot { display: inline-block; width: 9px; height: 9px; border-radius: 999px; margin-right: 6px; vertical-align: middle; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="title">Ingresos vs Gastos</div>
    <div class="sub">Mayo 2026</div>
    <svg viewBox="0 0 320 140">
      <g class="gl"><line x1="20" x2="320" y1="30" y2="30"/><line x1="20" x2="320" y1="70" y2="70"/><line x1="20" x2="320" y1="110" y2="110"/></g>
      <g><text x="0" y="34">$80k</text><text x="0" y="74">$40k</text><text x="0" y="114">$0</text></g>
      <g>
        <rect x="40"  y="40" width="14" height="70" rx="3" fill="#10B981"/>
        <rect x="56"  y="62" width="14" height="48" rx="3" fill="#F87171"/>
        <rect x="100" y="32" width="14" height="78" rx="3" fill="#10B981"/>
        <rect x="116" y="58" width="14" height="52" rx="3" fill="#F87171"/>
        <rect x="160" y="22" width="14" height="88" rx="3" fill="#10B981"/>
        <rect x="176" y="50" width="14" height="60" rx="3" fill="#F87171"/>
        <rect x="220" y="36" width="14" height="74" rx="3" fill="#10B981"/>
        <rect x="236" y="44" width="14" height="66" rx="3" fill="#F87171"/>
        <rect x="280" y="18" width="14" height="92" rx="3" fill="#10B981"/>
        <rect x="296" y="40" width="14" height="70" rx="3" fill="#F87171"/>
      </g>
      <g><text x="40" y="128">Ene</text><text x="100" y="128">Feb</text><text x="160" y="128">Mar</text><text x="220" y="128">Abr</text><text x="280" y="128">May</text></g>
    </svg>
    <div class="legend"><span><span class="dot" style="background:#10B981"></span>Ingresos</span><span><span class="dot" style="background:#F87171"></span>Gastos</span></div>
  </div>
  <div class="card">
    <div class="title">Gastos por categoría</div>
    <div class="sub">Mayo 2026</div>
    <svg viewBox="0 0 320 140">
      <g transform="translate(120 70)">
        <circle r="50" fill="none" stroke="#7C6BFF" stroke-width="22" stroke-dasharray="100 314" transform="rotate(-90)"/>
        <circle r="50" fill="none" stroke="#10B981" stroke-width="22" stroke-dasharray="70 314" transform="rotate(25)"/>
        <circle r="50" fill="none" stroke="#F59E0B" stroke-width="22" stroke-dasharray="50 314" transform="rotate(105)"/>
        <circle r="50" fill="none" stroke="#3B82F6" stroke-width="22" stroke-dasharray="40 314" transform="rotate(165)"/>
        <circle r="50" fill="none" stroke="#EC4899" stroke-width="22" stroke-dasharray="54 314" transform="rotate(210)"/>
      </g>
      <g transform="translate(210 30)">
        <g><circle cx="0" cy="0" r="5" fill="#7C6BFF"/><text x="12" y="4">Supermercado</text></g>
        <g transform="translate(0 20)"><circle cx="0" cy="0" r="5" fill="#10B981"/><text x="12" y="4">Alquiler</text></g>
        <g transform="translate(0 40)"><circle cx="0" cy="0" r="5" fill="#F59E0B"/><text x="12" y="4">Servicios</text></g>
        <g transform="translate(0 60)"><circle cx="0" cy="0" r="5" fill="#3B82F6"/><text x="12" y="4">Transporte</text></g>
        <g transform="translate(0 80)"><circle cx="0" cy="0" r="5" fill="#EC4899"/><text x="12" y="4">Salidas</text></g>
      </g>
    </svg>
  </div>
</div>
<script>lucide.createIcons();</script></body></html>
