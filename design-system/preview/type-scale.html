<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
.row { display: grid; grid-template-columns: 110px 1fr 120px; align-items: baseline; gap: 16px; padding: 8px 0; border-top: 1px solid var(--color-border); }
.row:first-of-type { border-top: none; }
.tk { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--color-fg-3); }
.meta { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--color-fg-3); text-align: right; }
</style>
</head>
<body>
<div class="row"><div class="tk">display</div><div class="display">$ 248.500</div><div class="meta">40/44 · 700</div></div>
<div class="row"><div class="tk">h1</div><h1>Dashboard</h1><div class="meta">28/34 · 700</div></div>
<div class="row"><div class="tk">h2</div><h2>Ingresos vs Gastos</h2><div class="meta">22/28 · 600</div></div>
<div class="row"><div class="tk">h3</div><h3>Visa Galicia</h3><div class="meta">18/24 · 600</div></div>
<div class="row"><div class="tk">body</div><div class="body">Lo que gastaste este mes.</div><div class="meta">16/24 · 400</div></div>
<div class="row"><div class="tk">label</div><div class="label">Descripción</div><div class="meta">14/20 · 500</div></div>
<div class="row"><div class="tk">caption</div><div class="caption">26 may. 2026 · 14:32</div><div class="meta">12/16 · 500</div></div>
</body></html>
