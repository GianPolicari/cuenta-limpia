<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_base.css">
<style>
.row { display: flex; align-items: center; gap: 14px; padding: 6px 0; }
.tk { font-family: ui-monospace, monospace; font-size: 11px; color: var(--color-fg-3); width: 90px; }
.bar { background: var(--color-primary-subtle); border-radius: 4px; height: 12px; }
.val { font-family: ui-monospace, monospace; font-size: 11px; color: var(--color-fg-2); margin-left: auto; }
</style>
</head>
<body>
<div class="row"><div class="tk">--space-xs</div><div class="bar" style="width:4px"></div><div class="val">4 px</div></div>
<div class="row"><div class="tk">--space-sm</div><div class="bar" style="width:8px"></div><div class="val">8 px</div></div>
<div class="row"><div class="tk">--space-md</div><div class="bar" style="width:12px"></div><div class="val">12 px</div></div>
<div class="row"><div class="tk">--space-lg</div><div class="bar" style="width:16px"></div><div class="val">16 px</div></div>
<div class="row"><div class="tk">--space-xl</div><div class="bar" style="width:24px"></div><div class="val">24 px</div></div>
<div class="row"><div class="tk">--space-2xl</div><div class="bar" style="width:32px"></div><div class="val">32 px</div></div>
<div class="row"><div class="tk">--space-3xl</div><div class="bar" style="width:48px"></div><div class="val">48 px</div></div>
<div class="row"><div class="tk">--space-4xl</div><div class="bar" style="width:64px"></div><div class="val">64 px</div></div>
<div class="row"><div class="tk">--space-5xl</div><div class="bar" style="width:96px"></div><div class="val">96 px</div></div>
</body></html>
